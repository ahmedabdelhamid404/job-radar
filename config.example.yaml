# Job Radar config — copy to config.yaml and fill in. config.yaml is gitignored (never committed).

profile:
  must_have_any: [angular]          # a job must mention at least one of these (or "frontend" in the title)
  exclude_terms: [intern, internship, trainee, graduate, apprentice, junior]   # drop if these appear in the TITLE
  exclude_stacks: [".net", "asp.net", "dotnet", "full stack", "fullstack", "full-stack", "backend", "back end", "back-end"]  # backend-primary / full-stack roles (Angular not the main job)
  skills:                           # used to score fit + build the match pitch
    - Angular
    - TypeScript
    - RxJS
    - NgRx
    - Signals
    - Signal Store
    - Nx
    - Micro Frontend
    - Micro-Frontend
    - SSR
    - Hydration
    - SCSS
    - Sass
    - Tailwind
    - Bootstrap
    - Angular Material
    - CDK
    - Reactive Forms
    - REST
    - JavaScript
    - HTML
    - CSS
    - esbuild

markets:            # which regions to query on keyed aggregators (Jooble/Adzuna)
  remote_intl: true
  gulf: true
  egypt: true

work_style:         # keep only jobs that match these
  remote: true
  hybrid_egypt: true   # hybrid kept ONLY if the job is in Egypt (no relocation)
  onsite: false
  relocation: false

search:
  queries: [angular, "angular developer", "frontend engineer", "front end developer", "senior frontend"]
  max_age_days: 7          # only ingest jobs posted within this many days

keys:               # all optional — empty keys just skip that source
  jooble: ""              # https://jooble.org/api/about   (unlocks Gulf + Egypt)
  adzuna_app_id: ""       # https://developer.adzuna.com
  adzuna_app_key: ""
  careerjet_affid: ""

apify:              # paid scrapers (LinkedIn / Wuzzuf / Indeed / Bayt). Empty token = skip them all.
  token: ""               # https://console.apify.com/account/integrations
  query: "Angular"
  spend_guard_usd: 4.50         # skip paid scrapers once this month's est. spend hits this
  monthly_budget_usd: 5.00      # Apify FREE plan hard-stops here regardless
  indeed_countries: ["us"]      # Indeed is 5x pricier per result; keep this list short
  bayt_country: "INTERNATIONAL" # INTERNATIONAL / EG / AE / SA
  wuzzuf_url: "https://wuzzuf.net/search/jobs/?q=angular"
  posts:                          # LinkedIn hiring POSTS (harvestapi, no cookie)
    cap: 25                       # worldwide net (cap = per-run cost ceiling; floor 6)
    posted_limit: "week"          # any | 1h | 24h | week | month
    queries:                      # keyword search = worldwide; timezone rule ranks far roles down
      - "Angular developer hiring"
      - "hiring Angular developer"
      - "we are hiring Angular developer"
      - "Angular developer remote"
      - "Angular frontend developer hiring"
      - "Angular engineer hiring"
      - "looking for Angular developer"
      - "Angular frontend vacancy"
      - "مطلوب مطور Angular"
      - "مطلوب فرونت اند"
      - "وظيفة Angular"
      - "فرصة عمل Angular"
      - "نوظف Angular"
  caps:                         # max results per run = the per-run cost cap
    linkedin: 20                # actor floor is 10
    wuzzuf: 20
    indeed: 15
    bayt: 15                    # floor 12 (clears the $0.01 start fee)
  actors:
    linkedin: "curious_coder~linkedin-jobs-scraper"
    wuzzuf: "shahidirfan~Wuzzuf-Jobs-Scraper"
    indeed: "borderline~indeed-scraper"
    bayt: "blackfalcondata~bayt-scraper"
  prices:                       # per-result + fixed start fee, for spend estimation
    linkedin: {result: 0.001, start: 0.0}
    wuzzuf:   {result: 0.001, start: 0.0}
    indeed:   {result: 0.005, start: 0.0}
    bayt:     {result: 0.001, start: 0.01}
    posts:    {result: 0.002, start: 0.0001}

alerts:
  telegram: true
  telegram_token: ""      # from @BotFather
  telegram_chat_id: ""    # your numeric chat id
  desktop_popup: false    # set true to also get a desktop notification
  email: false
  email_to: ""
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_pass: ""

dashboard:
  port: 5000
